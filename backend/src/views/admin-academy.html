<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Formations | Astra Studio</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#050608" />
    <link rel="icon" type="image/png" href="/assets/branding/astra-studio-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&amp;family=Sora:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <script defer src="/js/admin-academy.js"></script>
  </head>
  <body class="admin-body">
    <div class="admin-app">
      <aside class="admin-sidebar panel">
        <div class="admin-sidebar-brand">
          <img
            class="brand-logo"
            src="/assets/branding/astra-studio-logo.png"
            alt="Astra Studio"
            width="500"
            height="500"
          />
          <div>
            <span class="kicker">Astra Academy</span>
            <h1 class="admin-sidebar-title">Back-office formations</h1>
          </div>
        </div>

        <nav class="admin-sidebar-nav" aria-label="Navigation academy">
          <button class="admin-nav-link is-active" type="button" data-academy-section="overview">Vue d’ensemble</button>
          <button class="admin-nav-link" type="button" data-academy-section="courses">Formations</button>
          <button class="admin-nav-link" type="button" data-academy-section="submissions">Devoirs</button>
          <button class="admin-nav-link" type="button" data-academy-section="purchases">Paiements</button>
          <button class="admin-nav-link" type="button" data-academy-section="users">Élèves</button>
        </nav>

        <div class="admin-sidebar-note">
          <span class="kicker">Navigation</span>
          <p>Gérez les programmes, suivez les inscriptions, traitez les remises et pilotez les ventes.</p>
          <div class="button-row">
            <a class="button button-secondary" href="/admin">Cockpit global</a>
          </div>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header panel">
          <div>
            <span class="kicker" data-academy-kicker>Astra Academy</span>
            <h2 class="admin-header-title" data-academy-title>Vue d’ensemble</h2>
            <p class="admin-header-copy" data-academy-description>
              Une lecture opérationnelle de la plateforme formations Astra Studio.
            </p>
          </div>
          <div class="admin-header-actions">
            <button type="button" class="button button-secondary" data-academy-refresh>Actualiser</button>
            <button type="button" class="button button-secondary" data-academy-logout>Se déconnecter</button>
          </div>
        </header>

        <p class="form-feedback" data-academy-feedback role="status" aria-live="polite"></p>
        <section class="admin-view" data-academy-view></section>
      </main>
    </div>
  </body>
</html>
