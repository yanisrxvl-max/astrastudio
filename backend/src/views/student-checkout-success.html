<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paiement validé | Astra Studio</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#050608" />
    <link rel="icon" type="image/png" href="/assets/branding/astra-studio-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&amp;family=Sora:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/pages.css" />
    <script defer src="/js/learn-checkout-success.js"></script>
  </head>
  <body class="learn-body" data-page="learn-checkout-success">
    <main class="learn-shell">
      <section class="container">
        <article class="panel learn-checkout-panel">
          <span class="kicker">Activation en cours</span>
          <h1 class="display-title">Nous finalisons votre accès.</h1>
          <p class="subhead" data-checkout-copy>
            Vérification du paiement et ouverture automatique de votre formation.
          </p>
          <div class="diagnostic-progress-wrap">
            <div class="diagnostic-progress-bar"><span data-checkout-progress style="width: 25%"></span></div>
          </div>
          <p class="form-feedback" data-checkout-feedback role="status" aria-live="polite"></p>
          <div class="button-row" data-checkout-actions></div>
        </article>
      </section>
    </main>
  </body>
</html>
